info:
  name: Criar Turma
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/turmas
  body:
    type: json
    data: |-
      {
        "nome": "Turma de Java Backend - Noites",
        "nivel": "Intermediário",
        "limiteAlunos": 15,
        "tipo": "Regular",
        "horariosIds": [1, 2]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
