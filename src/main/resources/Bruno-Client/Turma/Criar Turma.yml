info:
  name: Criar Turma
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/turmas
  body:
    type: json
    data: |-
      {
        "nome": "Turma 1",
        "nivel": "B2",
        "limiteAlunos": 10,
        "tipo": "Grupo"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
